<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>115年ESG評鑑管理平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --surface:#FFFFFF;--surface2:#EBF2FF;
      --border:rgba(59,130,246,0.18);--border2:rgba(59,130,246,0.28);
      --accent:#2563EB;--esg-e:#16A34A;--esg-s:#EA580C;--esg-g:#7C3AED;
      --text:#1E293B;--text2:#334155;--text3:#64748B;
      --pass:#16A34A;--warn:#CA8A04;--fail:#DC2626;
      --r-md:8px;--r-lg:14px;--r-pill:100px;
    }
    body{font-family:"Noto Sans TC",sans-serif;background:#F0F5FF;color:var(--text);min-height:100vh}
    /* HEADER */
    header{background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%);border-bottom:1.5px solid rgba(59,130,246,0.22);box-shadow:0 2px 10px rgba(37,99,235,0.07);position:sticky;top:0;z-index:100}
    .hi{max-width:100%;margin:0 auto;padding:0 1.5rem;min-width:0;height:52px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo-badge{background:var(--accent);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:#fff;letter-spacing:.1em}
    .logo-text{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap}
    .hr{display:flex;align-items:center;gap:10px}
    .ss{font-size:11px;color:var(--text3);white-space:nowrap}
    .rb{display:inline-flex;align-items:center;gap:6px;font-family:"Noto Sans TC",sans-serif;font-size:12px;color:var(--text2);background:var(--surface);border:1px solid rgba(59,130,246,0.25);border-radius:var(--r-pill);padding:6px 14px;cursor:pointer;transition:.15s}
    .rb:hover{background:var(--surface2);border-color:var(--accent)}
    .rb svg{width:13px;height:13px;stroke:currentColor;fill:none}
    .rb.sp svg{animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sb{display:inline-flex;align-items:center;gap:6px;font-family:"Noto Sans TC",sans-serif;font-size:12px;color:#1D4ED8;background:#DBEAFE;border:1px solid rgba(59,130,246,0.35);border-radius:var(--r-pill);padding:6px 16px;text-decoration:none;transition:.15s}
    .sb:hover{background:#BFDBFE}
    .sb svg{width:14px;height:14px;fill:none;stroke:currentColor}
    /* HERO */
    .hero{background:linear-gradient(160deg,#EFF6FF 0%,#DBEAFE 60%,#C7D2FE 100%);border-bottom:1px solid rgba(99,102,241,0.15);padding:1.2rem 1.5rem 1rem;position:relative;overflow:hidden}
    .hbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .hin{max-width:100%;margin:0 auto;position:relative;z-index:1;display:flex;flex-direction:column;gap:1rem}
    .htb{background:rgba(255,255,255,0.82);backdrop-filter:blur(4px);border-radius:14px;padding:.9rem 1.4rem;max-width:520px}
    .hero h1{font-family:"Noto Serif TC",serif;font-size:24px;font-weight:600;color:#1E3A8A;line-height:1.4;margin-bottom:.35rem}
    .hero-sub{font-size:12px;color:#1D4ED8;line-height:1.9}
    .esg-badges{display:flex;gap:8px;margin-top:.7rem;flex-wrap:wrap}
    .eb{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 11px;border-radius:var(--r-pill)}
    .eb.E{background:#DCFCE7;color:#15803D;border:1px solid rgba(22,163,74,.25)}
    .eb.S{background:#FFEDD5;color:#C2410C;border:1px solid rgba(234,88,12,.25)}
    .eb.G{background:#EDE9FE;color:#6D28D9;border:1px solid rgba(124,58,237,.25)}
    .hsc{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch}
    .hcard{background:rgba(255,255,255,0.8);backdrop-filter:blur(4px);border-radius:12px;padding:.6rem 1rem;text-align:center;flex:1;min-width:80px}
    .hn{font-size:22px;font-weight:600}
    .hn.all{color:var(--accent)}.hn.pass{color:var(--esg-e)}.hn.ip{color:var(--warn)}.hn.sc{color:#7C3AED}.hn.fail{color:#DC2626}
    .hl{font-size:10px;color:var(--text3);margin-top:2px}
    /* TABS */
    .tabs{background:var(--surface);border-bottom:1px solid rgba(59,130,246,.12);padding:0 1.5rem;position:sticky;top:52px;z-index:98}
    .ti{max-width:100%;margin:0 auto;display:flex;overflow-x:auto}
    .tab{font-family:"Noto Sans TC",sans-serif;font-size:13px;padding:11px 17px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:.15s}
    .tab:hover{color:var(--accent)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
    /* CONTROLS */
    .cb{background:var(--surface);border-bottom:1px solid rgba(59,130,246,.1);padding:.5rem 1.5rem}
    .ci{max-width:100%;margin:0 auto;display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
    .sx{display:flex;align-items:center;gap:5px;border:1px solid rgba(59,130,246,.22);border-radius:var(--r-pill);padding:3px 9px;background:var(--surface);flex-shrink:0}
    .sx svg{width:13px;height:13px;stroke:var(--text3);fill:none;flex-shrink:0}
    .sx input{border:none;outline:none;font-family:"Noto Sans TC",sans-serif;font-size:11px;color:var(--text);background:transparent;width:100%}
    .fsep{width:1px;height:18px;background:rgba(100,116,139,0.25);flex-shrink:0;margin:0 3px}
    .fl{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
    .fb{font-family:"Noto Sans TC",sans-serif;font-size:11px;padding:3px 8px;border-radius:var(--r-pill);border:1px solid rgba(59,130,246,.22);background:transparent;color:var(--text2);cursor:pointer;transition:.15s;white-space:nowrap}
    .fb:hover{background:var(--surface2)}.fb.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .fb.fE.active{background:var(--esg-e);border-color:var(--esg-e)}
    .fb.fS.active{background:var(--esg-s);border-color:var(--esg-s)}
    .fb.fG.active{background:var(--esg-g);border-color:var(--esg-g)}
    .ml{margin-left:auto}
    /* STATS */
    .sa{max-width:100%;margin:1.2rem auto 0;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem}
    .st{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);padding:.8rem 1rem;transition:.15s}
    .st:hover{box-shadow:0 2px 12px rgba(37,99,235,.08)}
    .sn{font-size:24px;font-weight:500;color:var(--accent)}.sn.pass{color:var(--pass)}.sn.warn{color:var(--warn)}
    .sl{font-size:11px;color:var(--text3);margin-top:3px}
    /* PROGRESS */
    .ps{max-width:1300px;margin:1rem auto 0;padding:0 2rem}
    .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.1rem 1.4rem;display:flex;flex-direction:column;gap:12px}
    .pt{font-size:13px;font-weight:500;color:var(--text)}
    .pr{display:flex;align-items:center;gap:10px}
    .prl{font-size:12px;color:var(--text3);min-width:110px}
    .pbg{flex:1;height:9px;background:#E2E8F0;border-radius:100px;overflow:hidden}
    .pf{height:100%;border-radius:100px;transition:width .6s ease}
    .pf.all{background:linear-gradient(90deg,#3B82F6,#2563EB)}.pf.E{background:var(--esg-e)}.pf.S{background:var(--esg-s)}.pf.G{background:var(--esg-g)}
    .pp{font-size:12px;font-weight:600;min-width:34px;text-align:right}
    .pp.all{color:var(--accent)}.pp.E{color:var(--esg-e)}.pp.S{color:var(--esg-s)}.pp.G{color:var(--esg-g)}
    /* TABLE */
    .tw2{max-width:100%;margin:1.2rem auto 3rem;padding:0 1.5rem;overflow-x:auto}
    .dt{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;font-size:12px;min-width:900px;table-layout:fixed}
    .dt thead tr{background:#EFF6FF;border-bottom:1px solid var(--border2)}
    .dt th{padding:9px 11px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.04em;white-space:nowrap}
    .dt tbody tr{border-bottom:1px solid rgba(59,130,246,.07);transition:.1s}
    .dt tbody tr:last-child{border-bottom:none}
    .dt tbody tr:hover{background:#F8FAFF}
    .dt td{padding:8px 11px;vertical-align:top;color:var(--text)}
    .dt td.wl{line-height:1.6;max-width:280px}.dt td.w{line-height:1.6;max-width:200px}.dt td.c{text-align:center}
    /* GRID */
    .gs{max-width:1300px;margin:1.2rem auto 3rem;padding:0 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem}
    .card{background:var(--surface);border:1px solid rgba(59,130,246,.18);border-radius:var(--r-lg);display:flex;flex-direction:column;transition:.2s;cursor:pointer}
    .card:hover{border-color:rgba(59,130,246,.45);box-shadow:0 4px 20px rgba(37,99,235,.08);transform:translateY(-2px)}
    .cb2{padding:1.1rem;flex:1;display:flex;flex-direction:column;gap:9px}
    .ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .cm{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
    .ct{font-family:"Noto Serif TC",serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.6}
    .cd{font-size:11.5px;color:var(--text2);line-height:1.7}
    .cf{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0 0;border-top:.5px solid var(--border2);margin-top:auto;flex-wrap:wrap;gap:5px}
    /* BADGES */
    .badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-pill);white-space:nowrap}
    .b-pass{background:#DCFCE7;color:#15803D}.b-empty{background:#F1F5F9;color:#94A3B8}
    .etag{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
    .etag.E{background:#DCFCE7;color:#15803D}.etag.S{background:#FFEDD5;color:#C2410C}.etag.G{background:#EDE9FE;color:#6D28D9}
    .qtag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;letter-spacing:.04em}
    .qtag.Ap{background:#DBEAFE;color:#1D4ED8}.qtag.AA{background:#EDE9FE;color:#6D28D9}.qtag.A{background:#F1F5F9;color:#475569}.qtag.B{background:#FEF9C3;color:#854D0E}
    .qtag{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
    .qtag.A{background:#EFF6FF;color:#1D4ED8}.qtag.Ap{background:#F0FDF4;color:#15803D}.qtag.AA{background:#FDF4FF;color:#6D28D9}.qtag.B{background:#FFF7ED;color:#C2410C}
    .scbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
    .scbadge.has{background:#EFF6FF;color:#1D4ED8}.scbadge.empty{background:#F1F5F9;color:#94A3B8;font-weight:400}
    .pb2{display:inline-block;font-size:10px;background:#F0FDF4;color:#15803D;border:1px solid rgba(22,163,74,.2);border-radius:var(--r-pill);padding:1px 7px}
    /* MODAL */
    .mbg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;align-items:center;justify-content:center;padding:1rem}
    .mbg.open{display:flex}
    .mbox{background:var(--surface);border-radius:16px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,23,42,.25)}
    .mhdr{padding:1.3rem 1.5rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--surface);z-index:10;border-radius:16px 16px 0 0}
    .mtitle{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:600;color:var(--text);line-height:1.5;flex:1}
    .mclose{font-size:20px;color:var(--text3);cursor:pointer;line-height:1;flex-shrink:0;padding:2px 6px;border-radius:4px}
    .mclose:hover{background:#F1F5F9}
    .mbody{padding:1.1rem 1.5rem 1.4rem;display:flex;flex-direction:column;gap:1rem}
    .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .mrow{display:flex;flex-direction:column;gap:4px}
    .mlabel{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.05em}
    .mval{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap}
    .mval.hi2{background:#F8FAFF;border-radius:8px;padding:.65rem 1rem;border-left:3px solid var(--accent)}
    .mval.hi3{background:#FFFBEB;border-radius:8px;padding:.65rem 1rem;border-left:3px solid #F59E0B}
    .mgo{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--accent);text-decoration:none;padding:5px 13px;background:#EFF6FF;border-radius:var(--r-pill);transition:.15s}
    .mgo:hover{background:#DBEAFE}
    /* MISC */
    /* TABS BAR */
    .tabs-bar{background:var(--surface);border-bottom:1px solid rgba(59,130,246,.12);padding:0 1.5rem}
    .tabs-inner{display:flex;gap:0;max-width:100%}
    .tabx{font-family:"Noto Sans TC",sans-serif;font-size:13px;padding:11px 20px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:.15s}
    .tabx:hover{color:var(--accent)}.tabx.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
    /* SCORE PAGE */
    .score-wrap{max-width:100%;margin:1.5rem auto 3rem;padding:0 1.5rem}
    .score-title-row{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem}
    .score-section-title{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:600;color:var(--text)}
    .score-note{font-size:12px;color:var(--text3)}
    .score-row{border-bottom:1px solid rgba(59,130,246,.07)}
    .score-row:last-child{border-bottom:none}
    .score-row:hover{background:#F8FAFF}
    .score-row td{padding:10px 16px;vertical-align:middle}
    .score-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-pill);white-space:nowrap;line-height:1.6}
    .score-badge.cg{background:#DBEAFE;color:#1D4ED8}
    .score-badge.esg{background:#FEE2E2;color:#991B1B}
    .msg{grid-column:1/-1;padding:3.5rem 2rem;text-align:center;color:var(--text3);font-size:14px}
    .tmsg{padding:3.5rem 2rem;text-align:center;color:var(--text3);font-size:14px}
    .guide-cell{line-height:1.8}
    
    
    .dt td{padding:9px 10px;vertical-align:top;color:var(--text)}
    .dt tbody tr:hover{background:#F8FAFF}
    .hidden{display:none!important}
    .err{display:none;max-width:1300px;margin:.8rem auto 0;padding:.7rem 2rem;background:#FFF8E1;border:.5px solid rgba(251,192,45,.5);border-radius:var(--r-md);font-size:13px;color:#F57F17}
    .err.show{display:block}
    @media(max-width:768px){
      .hi{padding:0 1rem}.ss,.hsc{display:none}
      .hero{padding:1rem}.hero h1{font-size:20px}
      .tabs,.cb{padding-left:1rem;padding-right:1rem}
      .sa,.ps,.tw2,.gs{padding:0 1rem}
      .mgrid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header>
  <div class="hi">
    <div class="logo">
      <div class="logo-badge">ESG</div>
      <span class="logo-text">115年 ESG 評鑑管理平台</span>
    </div>
    <div class="hr">
      <span class="ss" id="ss">載入中…</span>
      <button class="rb" id="rb" onclick="refresh()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        重新整理
      </button>
      <a class="sb" href="https://docs.google.com/spreadsheets/d/1ItnIsyaXcd8ZfyD5TVcpbRRo9C9wG3x0dZ5emk4GSOI/edit?gid=827224600#gid=827224600" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        開啟試算表
      </a>
    </div>
  </div>
</header>

<section class="hero">
  <svg class="hbg" viewBox="0 0 1300 150" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#C7D2FE"/></linearGradient></defs>
    <rect width="1300" height="150" fill="url(#hg)"/>
    <circle cx="1050" cy="50" r="100" fill="rgba(99,102,241,0.06)"/>
    <circle cx="200" cy="80" r="80" fill="rgba(59,130,246,0.04)"/>
    <line x1="0" y1="40" x2="1300" y2="40" stroke="rgba(99,102,241,0.05)" stroke-width="1"/>
    <line x1="0" y1="80" x2="1300" y2="80" stroke="rgba(99,102,241,0.05)" stroke-width="1"/>
    <line x1="0" y1="120" x2="1300" y2="120" stroke="rgba(99,102,241,0.05)" stroke-width="1"/>
    <line x1="260" y1="0" x2="260" y2="150" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
    <line x1="520" y1="0" x2="520" y2="150" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="150" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="150" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
  </svg>
  <div class="hin">
    <div class="htb" style="max-width:100%">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem">
        <div>
          <h1>115年 ESG 評鑑管理</h1>
          <p class="hero-sub">即時同步 Google 試算表，追蹤填答進度與預估得分。</p>
        </div>
        <div class="esg-badges">
          <span class="eb E">🌿 環境面 E</span>
          <span class="eb S">🤝 社會面 S</span>
          <span class="eb G">⚖️ 治理面 G</span>
        </div>
      </div>
    </div>
    <div class="hsc" id="hsc" style="width:100%"></div>
  </div>
</section>

<div class="err" id="err">⚠️ Google Sheets 同步失敗（試算表需設為「知道連結的人可以檢視」）。目前顯示備用資料，重新整理可再次嘗試同步。</div>

<!-- ══ 搜尋 + 篩選控制列 ══ -->
<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tabx active" id="tabx-guide" onclick="switchTabX('guide')">📋 評鑑題目</button>
    <button class="tabx" id="tabx-fill" onclick="switchTabX('fill')">✍️ 填答專區</button>
    <button class="tabx" id="tabx-eval" onclick="switchTabX('eval')">📈 得分評估</button>
    <button class="tabx" id="tabx-score" onclick="switchTabX('score')">📊 歷年評鑑</button>
  </div>
</div>

<!-- ══ 評鑑題目頁 ══ -->
<div id="tabx-guide-panel">
<div class="cb">
  <div class="ci">
    <span class="fl">面向：</span>
    <button class="fb active" data-e="all" onclick="se(this,'all')">全部</button>
    <button class="fb fE" data-e="E" onclick="se(this,'E')">🌿 環境</button>
    <button class="fb fS" data-e="S" onclick="se(this,'S')">🤝 社會</button>
    <button class="fb fG" data-e="G" onclick="se(this,'G')">⚖️ 治理</button>
    <span class="fsep"></span>
    <span class="fl">負責人：</span>
    <button class="fb active" data-ow="all" onclick="se2(this,'all')">全部</button>

5": "", "score": "1"}, {"dimension": "環境面（E）", "no": "E-12", "prevNo": "4.29", "indicator": "公司是否導入內部碳定價，以估算氣候變遷對公司財務業務之影響？", "qtype": "A", "criteria": "本指標以公開資訊觀測站－ESG數位平台＞ESG資訊揭露＞氣候相關議題管理，為評鑑資訊依據。", "guide": "[要件]\n揭露內部碳定價價格制定基礎。\n[備註]\n要件資訊請揭露於公開資訊觀測站－ESG數位平台＞ESG資訊揭露＞氣候相關議題管理項下：指標「若使用內部碳定價作為規劃工具，應說明價格制定基礎」欄位。", "example": "有", "prevAns": "", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "環境面（E）", "no": "E-13", "prevNo": "4.13", "indicator": "公司是否制定並揭露環境管理制度及其執行情形？\n【若導入ISO14001或類似之環境管理系統標準，並經第三方驗證，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」或永續報告書，為評鑑資訊依據。", "guide": "符合[要件一]，於構面計分；另符合[要件二]，則總分另加一分。\n[要件一]\n揭露環境管理制度及114年度執行情形。\n[要件二]\n取得ISO 14001、OEKO-TEX® STeP Standard（紡織業）或bluesign®（紡織業）等環境管理認證，並揭露認證效期起訖年月日[期間需涵蓋至115年]。\n[備註]\n有關要件二認證效期起訖年月日之揭露，倘已更新認證效期涵蓋至115年，惟不及於年報或永續報告書揭露者，請於自評系統說明欄備註供查證，仍可得分。", "example": "有", "prevAns": "", "owner": "Ben", "ans115": "", "score": "1+1"}, {"dimension": "環境面（E）", "no": "E-14", "prevNo": "－", "indicator": "公司是否訂定並揭露生物多樣性政策或承諾，並說明實施情形？", "qtype": "A", "criteria": "本指標以公司網站、年報、永續報告書或自然相關財務揭露報告書（TNFD報告書），為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n訂定並揭露生物多樣性政策或承諾。\n[要件二]\n揭露當年度執行該政策或承諾之具體作為與成效（如生態保育行動、棲地復育計畫、生態影響評估執行情形等）。", "example": "有", "prevAns": "無", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "環境面（E）", "no": "E-15", "prevNo": "-", "indicator": "公司是否訂定並揭露推動自然碳匯之策略與措施，並說明實施情形？", "qtype": "A", "criteria": "本指標以公司網站、年報、永續報告書或自然相關財務揭露報告書（TNFD報告書），為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n訂定並揭露推動自然碳匯之策略與措施，並敘明與「臺灣2050淨零轉型自然碳匯關鍵戰略行動計畫」對照之策略與措施項目內容。\n[要件二]\n揭露當年度要件一所訂策略與措施之執行進度或達成情形。\n[備註]\n要件所列「臺灣2050淨零轉型自然碳匯關鍵戰略行動計畫」，請參考行政院國家發展委員會網站>十二項關鍵戰略第九項「自然碳匯關鍵戰略行動計畫」。（網址：https://www.ndc.gov.tw/Content_List.aspx?n=6BA5CC3D71A1BF6F）", "example": "有", "prevAns": "無", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "環境面（E）", "no": "E-16", "prevNo": "-", "indicator": "公司是否揭露所制定之供應商管理政策，要求供應商在環保等議題遵循相關規範，並說明實施情形？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」或永續報告書，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n訂定並揭露供應商管理政策及相關規範，且內容對供應商在環保等環境議題有積極具體之要求（如需通過相關認證）。\n[要件二]\n具體陳述供應商管理政策及相關規範之實施情形，如執行供應商盡職調查、供應商進行自評、輔導或教育、績效評估等實施情形。\n[備註]\n僅要求供應商遵守誠信原則、維持供貨品質或出具聲明書/切結書，本指標無法得分。", "example": "有", "prevAns": "無", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-1", "prevNo": "4.6", "indicator": "公司是否參考國際人權公約，制訂保障人權政策，並揭露政策內容及權責單位？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n已參考國際人權公約（請註明名稱），制訂並揭露保障人權政策內容。\n[要件二]\n揭露保障人權政策適用範圍及權責單位。\n[備註]\n國際人權公約包含但不限於：公民與政治權利國際公約（ICCPR）、經濟社會文化權利國際公約（ICESCR）、消除對婦女一切形式歧視公約（CEDAW）、兒童權利公約（CRC）、身心障礙者權利公約（CRPD）、消除一切形式種族歧視國際公約（ICERD）、保護所有移徙工人及其家庭成員權利國際公約（ICMW）、保護所有人免遭強迫失蹤國際公約（ICPPED）、禁止酷刑和其他殘忍、不人道或有辱人格的待遇或處罰公約（CAT）等。", "example": "有", "prevAns": "", "owner": "Jessie", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-2", "prevNo": "－", "indicator": "公司是否訂定並揭露人權盡職調查流程及其執行情形？\n【若揭露針對供應商所制定之人權盡職調查流程及其執行情形，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」，為評鑑資訊依據。", "guide": "需同時符合前三項要件，始能於構面計分；另符合[要件四]，則總分另加一分。\n[要件一]\n訂定並揭露人權盡職調查流程。\n[要件二]\n揭露114年度或115年度人權盡職調查範圍（如員工、客戶、供應商等）及重大人權議題（如薪資與工時、健康與安全、集會與結社自由等）。\n[要件三]\n揭露114年度或115年度實行之減緩或補救措施（如教育訓練、員工溝通、財務或非財務補償等）。\n[要件四]\n揭露針對供應商所制定之人權盡職調查流程及其執行情形（至少包含要件一至要件三內容）。\n[備註]\n倘不及於年報揭露者，如於永續報告書揭露所需要件，仍可得分。", "example": "有", "prevAns": "無", "owner": "Jessie", "ans115": "", "score": "1+1"}, {"dimension": "社會面（S）", "no": "S-3", "prevNo": "4.21", "indicator": "公司是否評估對社區之風險或機會且採行相應措施，並揭露其具體採行措施與實施成效？", "qtype": "A", "criteria": "本指標以公司網站、年報或永續報告書，為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分。\n[要件一]\n說明公司社區之範圍（如鄰里、鄉鎮、縣市等），若非屬公司營運所在地之區域，請另說明原因。\n[要件二]\n揭露當年度對社區之風險或機會之採行措施，如將資源投入或經由商業活動、文化活動、捐贈、企業志工服務或其他公益專業服務等，解決所在地社區之社會/環境問題，或促進社區發展，或適當聘用公司營運所在地之人力，以增進社區認同。\n[要件三]\n揭露上開措施之實施成效，如投資/捐贈金額、投入活動人數、受幫助人數、聘用公司營運所在地之人力比率或其他具體量化績效。", "example": "有", "prevAns": "", "owner": "Jessie", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-4", "prevNo": "4.22", "indicator": "公司是否投入資源支持國內文化發展，並揭露支持方式與成果？", "qtype": "A", "criteria": "本指標以公司網站、年報或永續報告書，為評鑑資訊依據。", "guide": "符合下列其中一項要件，且揭露相關資源投入總金額合計達新臺幣300萬元以上，始能於構面計分。\n[要件一]\n揭露當年度公司對國內表演團體、藝文組織或藝術家所舉辦之作品展示、表演與活動、軟硬體設備或其他技術支持等項目。\n[要件二]\n揭露當年度公司挹注於國產電影、電視或音樂之製作、發行、播送、映演、展演，或提供器材、設施、技術及其他專業服務等有助於完成電影、電視或音樂製作、發行、播送、映演、展演之協助。\n[要件三]\n揭露當年度公司鼓勵民眾接觸文化藝術活動、培養閱讀習慣，如挹注美術館、博物館、地方文化機構等藝文場館及國內出版，及支持舉辦中大型藝文活動、閱讀活動，以及響應政府培養藝文消費習慣之政策或計畫。\n[要件四]\n揭露當年度公司挹注於古蹟、歷史建築、紀念建築之保存、修復、維護及經營管理，或挹注於考古遺址出土遺物之整飭及展示等項目。\n[備註]\n支持方式與成果揭露需有具體支持內容與實施成效，如支持/投入金額、支持/合作單位名稱、活動名稱、活動時間地點、活動場次、活動參與/受惠人數或其他具體量化績效。", "example": "有", "prevAns": "", "owner": "Jessie", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-5", "prevNo": "4.14", "indicator": "公司是否揭露所辨別之利害關係人身份、關注議題、溝通管道與回應方式？\n【若定期將與各利害關係人溝通情形報告至董事會，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以公司網站或年報，為評鑑資訊依據。", "guide": "需同時揭露前三項要件，始能於構面計分；另符合[要件四]，則總分另加一分。\n[要件一]\n利害關係人類別（如包括但不限於股東、員工、客戶及供應商等）。\n[要件二]\n各類別利害關係人關注議題。\n[要件三]\n各類別利害關係人溝通管道（需有特定窗口與聯絡方式）與回應方式（如與股東透過法人說明會，與客戶透過滿意度調查等）。\n[要件四]\n將與各利害關係人溝通情形報告至董事會，並揭露報告之頻率（至少一年一次）或當年度向董事會報告之日期。", "example": "有", "prevAns": "", "owner": "Jessie", "ans115": "", "score": "1+1"}, {"dimension": "社會面（S）", "no": "S-6", "prevNo": "-", "indicator": "公司是否揭露與投資人議合（如法人說明會、親自拜訪、視訊、電話或電子郵件等方式）之情形，及投資人提問與公司回復之重要內容？", "qtype": "A", "criteria": "本指標以公司網站，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n揭露受評年度與投資人議合（如法人說明會、親自拜訪、視訊、電話或電子郵件等方式）之方式及次數。\n[要件二]\n揭露受評年度與投資人議合（如法人說明會、親自拜訪、視訊、電話或電子郵件等方式）之投資人提問及公司回復之重要內容。\n[備註]\n若法人說明會等無投資人提問，仍需於公司網站載明，方可得分。", "example": "有", "prevAns": "無", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-7", "prevNo": "4.2", "indicator": "公司是否設置推動企業誠信經營專（兼）職單位，負責誠信經營政策與防範方案之制訂及監督執行，並說明設置單位之運作及執行情形，且至少一年一次向董事會報告？", "qtype": "A", "criteria": "本指標以年報\\附表「履行誠信經營情形及與上市上櫃公司誠信經營守則差異情形及原因」，為評鑑資訊依據。", "guide": "需同時揭露以下三項要件，始能於構面計分。\n[要件一]\n推動企業誠信經營之單位名稱。\n[要件二]\n該單位運作及114年度執行情形（如工作計畫與執掌）。\n[要件三]\n該 n[備註]\n1、要件之投資可透過合併報表之子公司進行。\n2、創新型新創事業需符合以下任一條件：\n（1）國家發展委員會「六大核心戰略產業推動方案」及「五大信賴產業推動方案」 所列產業。\n（2）經濟部「具創新能力之新創事業認定原則」。\n（3）臺灣證券交易所股份有限公司有價證券上市審查準則第29條第1項：符合政府產業發展策略，擁有關鍵核心技術，及創新能力或創新經營模式。\n（4）財團法人中華民國證券櫃檯買賣中心創櫃板管理辦法第4條第1項第2款：「公司具創新、創意構想及未來發展潛力者」。 \n3、投資餘額以受評年度年底收盤價乘以股數餘額計算；若無收盤價者，則揭露受評年度年底投資餘額之帳面金額。", "example": "有", "prevAns": "無", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-12", "prevNo": "2.24", "indicator": "公司是否建置並揭露資通安全風險管理架構、資通安全政策、具體管理方案及投入資通安全管理之資源？\n【若導入ISO27001、CNS27001等資訊安全管理系統標準，或其他具有同等或以上效果之系統或標準，並取得第三方驗證，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以年報，為評鑑資訊依據。", "guide": "需同時符合前三項要件，於構面計分；另符合[要件四]，則總分另加一分。\n[要件一] \n建置並揭露資通安全風險管理架構（如成立資安專責單位、設置資安主管、設置資訊安全委員會、定期檢討資安政策，並定期向董事會報告等）。\n[要件二]\n訂定並揭露資通安全政策與具體管理方案（如識別資通安全風險並制定相應管理與監控措施、加入聯防組織等）。\n[要件三]\n揭露投入資通安全管理之資源量化數據（如投保資安險金額、設置人員總數及相關會議開會次數、資產監控覆蓋率等）。\n[要件四]\n導入ISO27001、CNS27001等資訊安全管理系統標準，或其他具有同等或以上效果之系統或標準，並取得第三方驗證，且揭露認證效期起訖年月日[期間需涵蓋至115年]。\n[備註]\n有關要件四認證效期起訖年月日之揭露，倘已更新認證效期涵蓋至115年，惟不及於年報揭露者，請於自評系統說明欄備註供查證，仍可得分。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1+1"}, {"dimension": "社會面（S）", "no": "S-13", "prevNo": "4.32", "indicator": "公司是否制定個人資料保護政策，並揭露內容及其實施情形？", "qtype": "A", "criteria": "本指標以公司網站、年報或永續報告書，為評鑑資訊依據。", "guide": "需同時符合下列三項要件，始能於構面計分。\n[要件一]\n訂定並揭露個人資料保護政策。\n[要件二]\n揭露個人資料保護政策適用範圍（至少包含客戶）及負責部門或人員。\n[要件三]\n揭露當年度實施情形相關量化數據（如員工訓練時數等）。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-14", "prevNo": "4.33", "indicator": "公司是否針對產品與服務之顧客健康與安全、行銷或標示等議題，制定相關保護消費者或客戶權益政策及申訴程序？", "qtype": "A", "criteria": "本指標以公司網站、年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」或永續報告書，為評鑑資訊依據。", "guide": "需同時符合下列兩項要件，始能於構面計分。\n[要件一]\n針對產品與服務之顧客健康與安全、行銷或標示等議題，制定並揭露保護消費者或客戶權益政策。\n[要件二]\n揭露申訴管道及申訴程序。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-15", "prevNo": "4.17", "indicator": "公司是否揭露所制定之供應商管理政策，要求供應商在職業安全衛生、勞動人權、資通訊安全或隱私權保護等議題遵循相關規範，並說明實施情形？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」或永續報告書，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n訂定並揭露供應商管理政策及相關規範，且內容對供應商在環保、職業安全衛生、勞動人權、資通訊安全或隱私權保護等議題有積極具體之要求（如需通過相關認證）。\n[要件二]\n具體陳述供應商管理政策及相關規範之實施情形，如執行供應商盡職調查、供應商進行自評、輔導或教育、績效評估等實施情形。\n[備註]\n僅要求供應商遵守誠信原則、維持供貨品質或出具聲明書/切結書，本指標無法得分。", "example": "有", "prevAns": "", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-16", "prevNo": "4.9", "indicator": "公司是否揭露各項員工福利措施、退休制度與其實施情形？\n【若公司平均每月「勞退新制雇主提繳率超過6%人數占全體提繳人數比例」超過10%，則總分另加一分。】", "qtype": "A+", "criteria": "本指標基本得分要件以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」，為評鑑資訊依據。\n本指標額外加分要件以勞動部之統計報表，為評鑑資訊依據。", "guide": "需同時揭露以下兩項要件，始能於構面計分；另符合[要件三]，則總分另加一分。\n[要件一]\n列舉員工福利事項（如員工福利信託、簽訂團體協約、友善請假制度等）。\n[要件二]\n說明公司退休制度具體內容及實施情形，例如：勞工退休金新、舊制之提撥比例與提撥狀況、員工申請退休之程序與條件等。不得以「已依法提撥退休金」或「已依勞工退休金相關法令辦理」等語取代。\n[要件三]\n公司（不含子公司）114年12月至115年11月平均每月「勞退新制雇主提繳率超過6%人數占公司全體提繳人數比例」超過10%。", "example": "有", "prevAns": "", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-17", "prevNo": "-", "indicator": "公司是否提供友善婚育或家庭照顧之職場環境與措施，並說明實施情形與成效？", "qtype": "A", "criteria": "本指標以永續報告書，為評鑑資訊依據。", "guide": "需同時揭露以下兩項要件，始能於構面計分。\n[要件一]\n提供友善婚育或家庭照顧之職場環境與措施（如舉辦促進職場聯誼交友相關活動、公司內部設置托兒設施、提供育兒或長者照顧措施、推動員工協助方案、提供優於勞動法令規定之婚育或家庭照顧措施等）。\n[要件二]\n揭露114年度或115年度實施情形與成效相關量化數據（如參與活動員工人數、補助費用等）。\n[備註]\n1、促進職場聯誼交友相關活動得與其他公司共同辦理。\n2、相關勞動法令可參考「勞動基準法」、「性別平等工作法」、「勞工請假規則」、「育嬰留職停薪實施辦法」。優於法令之範圍得包含但不限於結婚補助、生育補助、休假，或提供彈性工時等。", "example": "有", "prevAns": "無", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-18", "prevNo": "4.8", "indicator": "公司是否制訂並揭露政策，將經營績效或成果，適當反映在員工薪酬？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n揭露章程明訂：當年度如有獲利，應提撥為員工酬勞之明確比率固定數（如○%）、一定區間（如○%~○%）或下限（如○%以上、不低於○%）。\n[要件二]\n揭露經營績效或成果如何反映於員工薪酬政策及其實施情形。\n[備註]\n證券交易法第14條第6項有關章程訂明以年度盈餘提撥一定比率為基層員工調整薪資或分派酬勞之相關規範，應依主管機關令及問答集訂定。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-19", "prevNo": "4.10", "indicator": "公司是否揭露員工人身安全與工作環境之保護措施與其實施情形？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」，為評鑑資訊依據。", "guide": "符合下列其中一項要件，於構面計分。\n[要件一]\n具體說明對員工人身安全健康與工作環境保護措施與其114年度實施情形。\n[要件二]\n揭露公司已取得ISO 45001或TOSHMS認證，且揭露認證效期起訖年月日[期間需涵蓋至115年]。\n[備註]\n1、員工於工作場所有相當危險性的行業（如製造業倉儲運輸等），需詳述工作安全規定。\n2、各行業應具體說明員工工作場域之人身安全健康與工作環境保護措施（如職場安全健康與不利情境之火災風險辨識及關鍵可行之減災措施、職場不法侵害、霸凌或性騷擾等職場社會心理危害之因應措施等）及其實施情形；其中執行業務僅於辦公室等行業者，應就辦公場所採行措施予以敘明。\n3、僅敘述定期（不定期）安檢，未說明頻率或具體安全措施，無法得分。\n4、有關要件二認證效期起訖年月日之揭露，倘已更新認證效期涵蓋至115年，惟不及於年報揭露者，請於自評系統說明欄備註供查證，仍可得分。", "example": "有", "prevAns": "本公司以辦公室為主要工作場域，依《職業安全衛生法》建立職業安全衛生管理制度，設置一級單位－職安衛室及職業安全衛生委員會，定期每季召開乙次會議，推動職場安全與員工健康管理，降低不利情境對員工人身安全與營運之影響，相關內容業已揭露於113年年報第73-75；147-148頁、113年永續報告書第106-115頁、公司網站-職業安全與健康。\n一、職場安全管理與風險辨識\n本公司定期進行辦公室工作環境安全巡檢，針對用電安全、設備使用及人員動線等可能影響員工安全之風險進行辨識，並依評估結果採取預防與改善措施；113 年度未發生職業災害事件。另本公司持續運作 ISO 45001 職業安全衛生管理系統，並通過第三方驗證（有效期間：112 年7月13日至115年7月12日），相關管理措施均依制度執行，確保員工人身安全、健康與工作環境之保護。\n二、火災風險辨識及減災措施\n本公司針對辦公室火災風險，聚焦於用電安全及緊急疏散等不利情境，持續推動防火管理措施；除辦理防災教育訓練與宣導外，辦公建築採用防火標章天花板及防焰材質壁紙，並由專責人員每月透過 6S 管理進行滅火器及室內消防栓之配置與狀況檢查，另由職安衛室不定期辦理稽核，以確保消防設備之有效性。113-114年度未發生火災事件，亦無人員傷亡情形。\n三、員工人身安全與緊急應變措施\n本公司定期每年辦理職業安全衛生及緊急應變教育訓練，提升員工對突發事故之應變能力；並於辦公場所設置 AED，並進行相關操作宣導，以強化緊急救護能量，確保員工人身安全。\n四、作業環境監測與工作環境保護\n本公司依規定執行作業環境監測，檢視工作場所之安全與衛生狀況，113-114年度相關監測結果均符合法規標準，確保員工於安全、健康之工作環境中執行業務。\n五、員工健康管理與預防保健措施\n本公司定期每年提供全體員工健康檢查，並結合醫師與護理師健康諮詢、心理諮詢及健康促進活動，持續關注員工身心健康，預防職業傷病發生。", "owner": "Ben", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-20", "prevNo": "4.20", "indicator": "公司是否制定職場多元化或推動性別平等政策，並揭露其實施情形？", "qtype": "A", "criteria": "本指標以年報或永續報告書，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n訂定並揭露職場多元化政策（如性別、年齡、種族、國籍、出生地、身心障礙等歧視之禁止）或推動性別平等政策（如性騷擾之防治、改善性別薪資差距等）。\n[要件二]\n揭露114年度落實該政策之具體情形（如揭露員工性別、年齡、種族、國籍、出生地、身心障礙等之占比，或揭露男女薪資差異情形）。", "example": "有", "prevAns": "本公司訂有人權政策及「性別平等工作管理辦法」，明確禁止任何基於性別、性別認同、性傾向、年齡、種族、國籍、出生地、身心障礙等因素之差別待遇，並依《性別工作平等法》及相關法規，建構公平、尊重且安全之多元共融職場環境；相關內容揭露於 113 年度年報第 45、70、143 頁、113 年度永續報告書第 86–96 頁，及公司網站「永續人力」。\n一、多元聘用與中高齡、婦女就業支持\n本公司持續推動多元與包容之用人政策，並訂有「中高齡人才及退休員工樂齡職場促進辦法」，以制度化方式支持不同族群之就業發展。113 年度女性員工占全體員工 51.2%，男女比例均衡；50 歲以上員工占全體員工 21.4%，50 歲以上新進員工占新進員工 4.0%；另聘用 二度就業婦女 6 名及退休身分員工 2 名，透過彈性職務安排協助其重返與延續職場發展。\n另於公司治理層級，本公司董事會遴選納入性別平等考量，兼顧專業與獨立性；113 年度董事會 7 席中有 4 席為女性董事（占比 43%）\n二、身心障礙友善職場與包容性就業\n本公司保障身心障礙員工就業權益，依「身心障礙人才聘用辦法」提供合適職務及工作環境。113年度聘用身心障礙員工 2 人，占全體員工約 1.2%，優於身心障礙者權益保障法訂定不低於1%及 1 人之規定。。\n三、性別平權與男女薪酬公平\n本公司落實同工同質與薪酬公平原則，定期檢視薪資結構，避免因性別造成不合理差異。\n113年度不論主管或非主管職員工，男女平均薪酬比率皆於 1.14 以內；同年度男性員工調薪比率為 0.080%，女性員工調薪比率為 0.095%，顯示薪資調整未因性別有所差異。\n四、性騷擾防治與執行職務遭受不法侵害預防\n本公司訂有「性騷擾防制措施申訴及懲戒規範」，設置多元申訴管道，並確保申訴人身分與資料保密。113年度持續辦理性騷擾防治及不法侵害預防教育訓練，並未發生相關申訴案件，顯示防治措施運作有效。\n五、母性健康保護與友善育兒職場\n本公司依職業安全衛生法推動「工作場所母性健康保護計畫」，提供多元母性福利補助措施，包含自懷孕第七個月起每月最高 1.5 萬元之好孕專車補助，以及每胎 3.12 萬元之生育補助，並設置哺（集）乳室及與托育機構合作，營造友善育兒職場。\n113年度並辦理母性健康個案管理 1 人，提供懷孕同仁健康評估、醫師訪談與工作調整建議，協助員工兼顧工作與家庭。\n六、長照支持與家庭友善措施\n本公司推動長照友善職場，並訂有「員工親屬長照補助規定」，提供員工親屬長期照顧補助，每人每年 2 萬元。\n113年度申請長照補助共 17 人次，合計補助金額85,000元，有效協助員工減輕長期照顧負擔，提升員工留任與工作穩定性。", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-21", "prevNo": "4.30", "indicator": "公司是否制定提升員工職涯能力之員工培訓發展計畫，並揭露內容及其實施情形？", "qtype": "A", "criteria": "本指標以年報\\附表「推動永續發展執行情形及與上市上櫃公司永續發展實務守則差異情形及原因」或永續報告書，為評鑑資訊依據。", "guide": "需同時符合下列兩項要件，始能於構面計分。\n[要件一]\n揭露培訓計畫所涵蓋面向（如新人訓練、專業進修、主管訓練等）、範圍（如各級主管、同仁等）及內容。\n[要件二]\n揭露114年度投入於培訓計畫之量化資源（如課程時數、參與課程人數、證照補助費用等）。", "example": "有", "prevAns": "本公司為提升員工整體職涯發展能力，訂有完善之員工培訓發展計畫，並榮獲114年《天下雜誌》天下人才永續獎，且連續三年入榜「天下人才永續100強」，相關內容已揭露於113年年報第75–76頁及113年永續報告書第96–100頁。\n一、培訓計畫\n本公司規劃多元員工培訓計畫，培訓面向涵蓋「新人入職培育與適應」、「核心專業能力培育」、「新手主管職能培育」及「ESG永續發展職能培育」等，適用對象範圍包含全體員工，如新進人員、一般同仁及各級主管。\n在新人入職培育方面，依「教育訓練實施辦法」規劃到職當日、到職後一週、一個月及三個月之分階段學習內容，協助新進人員逐步認識公司文化、核心價值、產品及重要制度，並透過部門關懷學長姐制度，由資深同仁提供實務引導與輔導，加速適應工作環境與部門運作。\n在核心專業能力培育方面，配合公司發展目標與職務需求，透過內部訓練、外派教育訓練及數位學習平台等多元方式，系統性強化員工於專業、管理及一般通識等職能，支持員工持續精進並提升整體組織效能。\n在新手主管職能培育方面，透過新手主管培訓制度，協助新任主管釐清管理角色與責任，強化團隊領導、溝通協調與績效管理能力，降低角色轉換期間之適應壓力，提升團隊穩定度與管理效能。\n在ESG永續發展職能培育方面，依公司永續發展策略規劃主題式課程，內容涵蓋永續基礎概念、管理實務及專業永續知識，並建構永續學習地圖，提升同仁對永續議題之認知與實務能力，逐步形塑組織內部之永續文化。\n二、投入量化資源\n113年度本公司持續投入資源推動員工培訓計畫，全年教育訓練總時數達4,504小時，平均每人受訓時數約26.0小時；當年度教育訓練相關投入費用共計710仟元，其中外訓及證照補助費用為460仟元，以支持同仁專業進修與證照取得。\n在培訓成效方面，113年度新人入職培育計畫共計25名新進員工參與，新手主管培訓課程受訓人數為3人，ESG永續相關課程共辦理20門，累計參與人次達699人次，顯示本公司持續以制度化與量化方式投入培訓資源，支持員工專業成長與長期職涯發展。", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-22", "prevNo": "4.31", "indicator": "公司是否定期進行員工意見調查，並揭露其實施情形及改善計畫？", "qtype": "A", "criteria": "本指標以公司網站、年報或永續報告書，為評鑑資訊依據。", "guide": "需同時符合下列兩項要件，始能於構面計分。\n[要件一]\n揭露當年度執行員工意見調查結果（調查題項應與薪酬、工作環境、職涯發展、企業文化或永續經營等員工較重視項目相關）及其實施情形（至少包括覆蓋率、調查單位、調查頻率及調查期間）。\n[要件二]\n揭露針對當年度員工意見調查所擬訂之改善計畫內容。\n[備註]\n1、員工意見調查得以敬業度調查、滿意度調查或幸福感調查等名稱執行。\n2、覆蓋率係指回復調查之員工人數除以員工總人數。員工總人數得採人數計算（人頭數）或以全時等量法（Full Time Equivalent, FTE）表示。", "example": "有", "prevAns": "本公司於永續官網-永續人力頁面中，敘明114 年度員工滿意度調查所擬訂之改善計畫內容，並於113年報第145-147頁揭露113年度員工滿意度調查情形與改善計畫內容。\n官網連結：https://www.planet.com.tw/tw/sustainability/employment-ehs\n本公司每年定期辦理員工滿意度調查，114年4月1日進行調查對象涵蓋全體員工，共回收有效問卷170份，回覆率達100%。\n本次問卷內容涵蓋「主管領導」、「工作成就」、「團隊合作」、「福利制度」、「健康平衡」、「學習發展」、「企業文化」及「永續發展」等八大面向，聚焦員工對公司整體制度與組織文化的感受。除滿意度評估外，亦同步調查員工對各議題之重要程度，以掌握員工關注重點，作為公司持續優化管理制度及推動相關改善措施之重要參考。\n調查結果顯示，員工對各構面之「滿意」及「非常滿意」比例皆達高水準（97%以上），顯示員工普遍對公司整體管理制度、工作環境及企業文化持正面肯定態度。此外，本次調查亦發現員工對「永續發展」與「學習發展」議題之關注程度相對較低，本公司據此擬訂之改善計畫內容如下：\n1.推動「永續大使」制度\n由各部門負責永續指標之同仁擔任「永續大使」，組成跨部門永續推動網絡。114年度分別於7月25日、9月5日及10月21日辦理永續大使交流會，透過跨部門經驗分享與協作，使永續發展不再侷限於單一單位推動，逐步建立公司內部穩定之永續合作機制，並提升員工對「永續發展」議題之關注與參與。\n2.升級「創E學堂」學習平台\n自114年4月起於既有線上自主學習平台導入AI設計的學習獎勵與任務挑戰機制，打造更具互動性與參與感的學習環境。透過活潑且創新的學習體驗，引導員工由「要我學」轉變為「我想學」，提升員工對「學習發展」議題的關注與參與，並促進知識累積逐步轉化為實際工作表現與組織效益。推動5個月內，累計完成1,900堂課程，總學習時數達723小時。", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "社會面（S）", "no": "S-23", "prevNo": "-", "indicator": "公司是否依性別及年齡揭露過去兩年員工離職率，並說明其變化趨勢與原因？", "qtype": "A", "criteria": "本指標以永續報告書，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n依性別與年齡揭露113年及114年員工離職率。\n[要件二]\n說明離職率變化趨勢及其原因。", "example": "有", "prevAns": "無", "owner": "Jordan", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-1", "prevNo": "1.1", "indicator": "公司是否於股東常會報告董事領取之酬金，包含酬金政策、個別酬金內容、數額及與績效評估結果之關聯性？", "qtype": "A", "criteria": "本指標以公開資訊觀測站＞單一公司＞電子文件下載＞年報及股東會相關資料＞議事手冊及會議補充資料，為評鑑資訊依據。", "guide": "受評年度股東常會需同時符合以下三項要件，始能於構面計分。\n[要件一]\n受評年度股東常會議案提董事酬金報告案（需單獨列一案）。\n[要件二]\n報告案說明酬金政策及與績效評估結果之關聯性（需列舉重要項目，不得僅以個人表現/績效/貢獻等文字替代之）。\n[要件三]\n報告案揭示每位董事之個別酬金細目（完整揭露年報附表「一般董事及獨立董事之酬金（個別揭露姓名及酬金方式）」之各欄位資訊，始能得分）。\n[備註]\n該報告案不得與他案（如董事與員工酬勞分派案）併陳，抑或僅列於他案之說明。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": ""}, {"dimension": "治理面（G）", "no": "G-2", "prevNo": "1.6", "indicator": "公司是否於五月底前召開股東常會？", "qtype": "A", "criteria": "本指標以公開資訊觀測站＞彙總報表＞股東會/股利＞股東會＞基本資訊彙總＞召開股東常（臨時）會日期、地點及採用電子投票情形等資料彙總表，為評鑑資訊依據。", "guide": "[要件]\n受評年度5月底前召開股東常會。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-3", "prevNo": "1.3", "indicator": "公司是否有董事長、過半數董事及審計委員會召集人親自出席股東常會，並於議事錄揭露出席名單？", "qtype": "A", "criteria": "本指標以公開資訊觀測站＞單一公司＞電子文件下載＞年報及股東會相關資料＞股東會議事錄，為評鑑資訊依據。", "guide": "受評年度股東常會需同時符合以下四項要件，始能於構面計分。\n[要件一]\n董事長親自出席。\n[要件二]\n親自出席之董事超過當屆選任席次半數。\n[要件三]\n審計委員會召集人親自出席。\n[要件四]\n股東常會議事錄中揭露出席之董事名單，且揭露會議主席為董事長（需親自出席）。\n[備註]\n1、若當屆有董事改選情形，以改選前該屆董事會席次計算員額。\n2、法人董事需揭露出席之代表人姓名。\n3、如以視訊參與會議者，視為親自出席。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-4", "prevNo": "1.7", "indicator": "公司是否於股東常會開會30日前上傳中文版及英文版股東會議事手冊及會議補充資料，並於股東常會開會18日前上傳中文版及英文版年報？", "qtype": "A", "criteria": "本指標以公開資訊觀測站＞單一公司＞電子文件下載＞年報及股東會相關資料，為評鑑資訊依據。", "guide": "受評年度股東常會需同時符合以下三項要件，始能於構面計分。\n[要件一]\n中文版及英文版議事手冊及會議補充資料上傳至公開資訊觀測站之隔天，至股東常會開會前1日，期間有30日（含）以上。\n[要件二]\n中文版及英文版年報上傳至公開資訊觀測站之隔天，至股東常會開會前1日，期間有18日（含）以上。\n[要件三]\n英文版議事手冊及會議補充資料及英文版年報內容需與其中文版一致。\n[備註]\n1、依經濟部84.2.25商202275號函，日數之計算應適用民法§119、§120第2項不算入始日之規定，自通知之翌日起算至開會前1日，算足公司法所定期間。\n2、若資料申報後更正，則以最後申報日計算。股東會後上傳「股東會後修訂本」年報者，不影響本指標評分。\n3、以年報作為議事手冊之補充資料者，年報需與議事手冊一併於股東常會開會30日前上傳，始能得分。\n4、要件一所列第30日如為假日，不予順延。要件二所列第18日（或備註3所列第30日）如為假日，不予順延。\n5、倘公司依「公開發行公司年報應行記載事項準則」第22-1條規定，於公開資訊觀測站公告申報該條文所列內容並於中文版年報記載資訊查詢索引，而英文版年報非以索引方式而係依規揭露內容者，尚非屬中英文內容不一致之情形。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-5", "prevNo": "1.18", "indicator": "公司股東常會是否採線上直播或會後上傳全程不間斷錄音錄影，並於議事錄記載股東提問及公司回復之重要內容？", "qtype": "A", "criteria": "本指標之「採線上直播或會後上傳全程不間斷錄音錄影」，以公開資訊觀測站＞單一公司＞電子文件下載＞年報及股東會相關資料＞開會通知或公司網站，為評鑑資訊依據。\n本指標之「於議事錄記載股東提問及公司回復之重要內容」，以公開資訊觀測站＞單一公司＞電子文件下載＞年報及股東會相關資料＞股東會議事錄，為評鑑資訊依據。", "guide": "受評年度股東常會需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n至少符合下列其中一項：\n1、開會通知載明線上直播網址或如何觀看之說明。\n2、公司網站提供全程不間斷錄影檔案或觀看網址。\n[要件二]\n議事錄記載股東提問及公司回復之重要內容。\n[備註]\n1、本指標之線上直播不得限定觀看者身分，亦即任何人知悉直播網址或觀看方式皆可收看（如YouTube）。\n2、公司網站之股東常會錄影檔案或觀看網址，亦不得限定觀看者身分。\n3、若股東常會無股東提問，仍需於議事錄載明，方可得分。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-6", "prevNo": "1.13", "indicator": "公司於受評年度發放現金股利時，是否皆於除息基準日後30日內發放完畢？", "qtype": "B", "criteria": "本指標以公開資訊觀測站＞彙總報表＞股東會/股利＞除權息/股利＞除權息公告，為評鑑資訊依據。", "guide": "[要件]\n受評年度（以除息基準日為準）發放現金股利（含單次或多次），皆於除息基準日之隔天起算30日內發放完畢。\n[備註]\n1、第30日如為假日，因銀行無法作業，可順延至次一營業日。\n2、受評年度公司未發放現金股利之公司，本指標不適用。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-7", "prevNo": "1.5", "indicator": "公司是否制定提升企業價值具體措施，且提報董事會，並將相關資訊揭露於公開資訊觀測站「提升企業價值計畫專區」？", "qtype": "A", "criteria": "本指標以公開資訊觀測站＞主題專區＞投資專區＞提升企業價值計畫專區，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分。\n[要件一]\n受評年度於公開資訊觀測站「提升企業價值計畫專區」上傳公司所制定之提升企業價值計畫。\n[要件二]\n該提升企業價值計畫於上傳公開資訊觀測站前經提董事會報告（需至少為報告案）。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-8", "prevNo": "1.2", "indicator": "公司是否訂定與關係人相互間之財務業務相關作業之書面規範，內容應包含進銷貨、取得或處分資產等交易之管理程序，及相關重大交易應提董事會決議通過，並提股東會同意或報告？", "qtype": "A", "criteria": "本指標以公司網站，為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分。\n[要件一]\n訂定並揭露與關係人相互間之財務業務相關作業之書面規範。\n[要件二]\n上開規範內容需包括進銷貨交易、取得或處分資產之管理程序，並明訂定前開各項重大交易應提報董事會通過後始得進行。\n[要件三]\n上開規範內容需包含與個別關係人之重大進銷貨交易及取得或處分資產交易已提董事會通過者，應於年度結束將實際交易情形提最近期股東會報告。\n[備註]\n與關係人相互間之財務業務相關作業之書面規範，可參考「股份有限公司關係人相互間財務業務相關作業規範」參考範例訂定相關規範。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-9", "prevNo": "1.15", "indicator": "公司是否訂定並於公司網站揭露禁止董事或員工等內部人利用市場上未公開資訊買賣有價證券之內部規範，內容包括（但不限於）董事不得於年度財務報告公告前三十日，和每季財務報告公告前十五日之封閉期間交易其股票，與說明執行情形？", "qtype": "A", "criteria": "本指標以公司網站，為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分，但有備註2之情形例外。\n[要件一]\n訂定並揭露內部人禁止內線交易之內部規範。\n[要件二]\n上開規範內容需包括（但不限於）董事不得於年度財務報告公告前三十日，和每季財務報告公告前十五日之封閉期間交易其股票。\n[要件三]\n揭露115年度落實該規範之具體情形（如於內部作業增訂於財務報告公告之30日/15日前通知董事，或對內部人辦理之宣導課程主題、時數與參加人次）。\n[備註]\n1、依「公開發行公司建立內部控制制度處理準則」第8條，上市櫃公司需制訂「防範內線交易之管理」作業，可參考「○○股份有限公司內部重大資訊處理作業程序」範例訂定。關於董事不得於財務報告公告前之封閉期間交易其股票，可參考「上市上櫃公司治理實務守則」及其問答集訂定相關規範。\n2、若受評年度至次年第一次ESG評鑑委員會前，公司有內線交易或短線交易行使歸入權之情事，經ESG評鑑委員會討論額外減分者，本指標亦不予給分。\n3、要件二之規範內容如依「上市上櫃公司治理實務守則」第10條第4項【前項規範「宜」包括上市上櫃公司內部人於獲悉公司財務報告或相關業績內容之日起之股票交易控管措施，包括（但不限於）董事不得於年度財務報告公告前三十日，和每季財務報告公告前十五日之封閉期間交易其股票】訂定，不符合要件。\n4、要件三之宣導對象應包括董事與員工，不得僅以董事、公司治理、會計、稽核主管等之進修課程取代之。\n5、關於要件一及要件二之評分，需於公司網站專區（例如公司治理或公司重要規定專區）揭露禁止內線交易及董事不得於財務報告公告前之封閉期間交易其股票之內部規範完整內容。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-10", "prevNo": "1.17", "indicator": "公司是否未有單一法人組織及其子公司占董事會席次達三分之一以上？\n【若公司未有以法人或其代表人擔任董事，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以年報（董事屬法人股東代表者，應揭露法人股東名稱及該法人之股東持股比例占前十名之股東名稱及其持股比例；各該前十名股東屬法人股東者，尚應揭露法人股東名稱及該法人之股東持股比例占前十名股東之名稱及其持股比例），為評鑑資訊依據。", "guide": "符合[要件一]，於構面計分；另符合[要件二]，則總分另加一分。\n[要件一]\n依據當屆董事會選任董事席次計算，如有單一法人組織及其子公司代表，席次不得占1/3（含）以上。\n[要件二]\n所有董事皆為自然人（不包括法人之代表人）。\n[備註]\n1、若當屆有董事改選情形，以改選前該屆董事會應選席次計算員額。\n2、公司之法人董事屬政府機關者，不納入要件一及要件二計算。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-11", "prevNo": "2.2", "indicator": "公司是否訂定並揭露董事會成員多元化之政策、具體管理目標與落實情形？\n【若公司董事單一性別皆不少於董事會席次三分之一，則總分另加一分。】", "qtype": "A+", "criteria": "本指標基本得分要件以年報，為評鑑資訊依據。\n本指標額外加分要件以公司申報「公司治理組織架構（含董事會組成之基本資訊）申報作業」之在任董事性別席次資訊，輔以公開資訊觀測站＞單一公司＞股權變動/證券發行＞董監大股東持股/質押/轉讓＞董監事持股餘額明細（受評年度12月份），為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分；另符合[要件四]，則總分另加一分。\n[要件一]\n訂定並揭露關於董事會成員多元化之政策。\n[要件二]\n揭露多元化政策之具體管理目標（請針對多元化之重要項目，如性別或專長，設定一定席次或比率的董事須具備該背景或專長之目標）與目前達成情形。\n[要件三]\n揭露依公司之董事會成員多元化政策下，個別董事背景之多元化情形（另建議提供如具員工身份之董事占比及獨立董事占比、女性董事占比、產業經驗/專業分布情形、獨立董事任期年資分布情形、董事年齡分布情形等量化數據）。\n[要件四]\n受評年度年底公司董事單一性別皆不少於董事會席次1/3（1/3[含]以上者符合本要件）。\n[備註]\n1、多元化政策可參考證交所與櫃買中心發布之「上市上櫃公司治理實務守則」及「○○股份有限公司董事選任程序參考範例」。\n2、董事會成員多元之精神是互補，若每一位董事皆具有相同之產業經驗及專業能力，不予給分。\n3、受評年度最後一次股東會後，任一性別董事因法令規定辭任或逝世，致人數不符上述要件四者，請於自評系統說明欄備註供查證，仍可得分。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1+1"}, {"dimension": "治理面（G）", "no": "G-12", "prevNo": "2.3", "indicator": "公司之董事長與總經理或其他相當職級者（最高經理人）是否非為同一人或互為配偶或一親等親屬？", "qtype": "A", "criteria": "本指標以公司申報「董事長、總經理或相當職務者之關係人及董事兼任員工資訊申報作業」資訊，為評鑑資訊依據。", "guide": "[要件]\n受評年度年底董事長與總經理或其他相當職級者（最高經理人如總裁、執行長等）非為同一人或互為配偶或一親等親屬關係。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": ""}, {"dimension": "治理面（G）", "no": "G-13", "prevNo": "2.4", "indicator": "公司之董事間是否不超過二人具有配偶或二親等以內之親屬關係，且具本公司、母、子或兄弟公司員工身分之人數，不超過董事席次三分之ㄧ？", "qtype": "A", "criteria": "本指標之「公司之董事間是否不超過二人具有配偶或二親等以內之親屬關係」以公司申報「內部人具配偶或二親等及十大進銷貨客戶申報作業」資訊，為評鑑資訊依據。\n本指標之「公司之董事間具本公司、母、子或兄弟公司員工身分之人數，是否不超過董事席次三分之ㄧ」以公司申報「董事長、總經理或相當職務者之關係人及董事兼任員工資訊申報作業」資訊，為評鑑資訊依據。", "guide": "需同時符合以下兩項要件，始能於構面計分\n[要件一]\n受評年度年底董事間具配偶或二親等以內關係之最多一組人數未超過2人（3人[含]以上者無法得分）。\n[要件二]\n至少符合下列其中一項：\n1、受評年度年底公司董事成員未兼任本公司、母、子或兄弟公司員工。\n2、受評年度年底公司董事成員兼任本公司、母、子或兄弟公司員工，其人數未超過董事席次1/3（1/3[含]以下者符合本要件）。\n[備註]\n董事及董事長非員工身分；而總經理、執行長及其他職務皆為員工身分。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-14", "prevNo": "2.7", "indicator": "公司獨立董事席次是否達董事席次三分之一以上？\n【若公司獨立董事席次達董事席次二分之一以上，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以公司申報「公司治理組織架構（含董事會組成之基本資訊）申報作業」，輔以公開資訊觀測站＞單一公司＞股權變動/證券發行＞董監大股東持股/質押/轉讓＞董監事持股餘額明細（受評年度12月份），為評鑑資訊依據。", "guide": "符合[要件一]，於構面計分；另符合[要件二]，則總分另加一分。\n[要件一]\n受評年度年底公司獨立董事席次達當屆選任董事席次1/3（含）以上。\n[要件二]\n受評年度年底公司獨立董事席次達當屆選任董事席次1/2（含）以上。\n[備註]\n受評年度最後一次股東會後，獨立董事因法令規定辭任或逝世，致人數不符上述要件者，請於自評系統說明欄備註供查證，仍可得分。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1+1"}, {"dimension": "治理面（G）", "no": "G-15", "prevNo": "2.8", "indicator": "公司獨立董事之連續任期是否皆不超過三屆？", "qtype": "A", "criteria": "本指標以公司申報「公司治理組織架構（含董事會組成之基本資訊）申報作業」，輔以公開資訊觀測站＞單一公司＞股權變動/證券發行＞董監大股東持股/質押/轉讓＞董監事持股餘額明細（受評年度12月份），為評鑑資訊依據。", "guide": "[要件]\n受評年度年底所有獨立董事之連續任期皆未超過三屆。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-16", "prevNo": "2.10", "indicator": "公司是否揭露審計委員會及薪資報酬委員會成員專業資格與經驗、年度工作重點及運作情形？", "qtype": "A", "criteria": "本指標以年報，為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分。\n[要件一]\n揭露審計委員會及薪資報酬委員會委任成員之專業資格（如具會計師、律師執業資格等）與經驗（如工作經歷、擔任職務、重要成就等）。\n[要件二]\n說明審計委員會及薪資報酬委員會年度工作重點彙整（如審閱財務報告、考核內部控制制度之有效性、檢討董事及經理人績效評估與薪資報酬之政策、制度、標準與結構等）。\n[要件三]\n揭露114年度審計委員會及薪資報酬委員會運作情形（至少包含開會議案內容摘要及決議結果、公司對審計委員會及薪資報酬委員會意見之處理等）及審計委員會及薪資報酬委員會之績效評估（至少包含評估之期間、方式[如內部自評、成員自評、同儕評估等]、標準[如內容及項目]、評估結果及提報董事會日期等）。\n[備註]\n要件一之內容可揭露於「公開發行公司年報應行記載事項準則」附表一「董事及監察人資料」。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-17", "prevNo": "2.14", "indicator": "公司是否設置提名委員會，其人數不少於三人，半數以上成員為獨立董事，且由獨立董事擔任召集人及會議主席，並揭露其組成、職責及運作情形？", "qtype": "A", "criteria": "本指標以公司網站及年報，輔以公開資訊觀測站＞彙總報表＞公司治理＞公司組織/結構＞功能性委員會/組織成員，為評鑑資訊依據。", "guide": "需同時符合以下四項要件，始能於構面計分。\n[要件一]\n受評年度年底前已設置提名委員會。\n[要件二]\n成員3人（含）以上，且半數（含）以上為獨立董事。\n[要件三]\n召集人及會議主席為獨立董事。\n[要件四]\n揭露提名委員會組成（至少包括委員姓名、召集人及會議主席姓名）、職責及當年度運作情形。\n[備註]\n1、公司網站、年報及公開資訊觀測站需分別揭露；惟於年報刊印日後始設置提名委員會者，需於公司網站及公開資訊觀測站分別揭露。（前開公開資訊觀測站之揭露係指揭露於公開資訊觀測站＞彙總報表＞公司治理＞公司組織/結構＞功能性委員會/組織成員）\n2、提名委員會之設置，可參考「○○股份有限公司提名委員會組織規程」參考範例。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-18", "prevNo": "2.22", "indicator": "公司是否由審計委員會或董事會層級之功能性委員會（如風險管理委員會）督導風險管理，並訂定經董事會通過之風險管理政策與程序，揭露風險管理組織架構、風險管理程序及其運作情形，且至少一年一次向董事會報告？", "qtype": "AA", "criteria": "本指標以公司網站，輔以公開資訊觀測站＞彙總報表＞公司治理＞公司組織/結構＞功能性委員會/組織成員，為評鑑資訊依據。", "guide": "需同時符合以下四項要件，始能於構面計分外，總分另加一分。\n[要件一]\n由審計委員會或董事會層級之功能性委員會（如風險管理委員會）督導風險管理，該委員會成員需3人（含）以上，且半數（含）以上為獨立董事。\n[要件二]\n揭露風險管理政策與程序並經董事會通過。\n[要件三]\n揭露風險管理組織架構、風險管理程序及115年度之運作情形。\n[要件四]\n揭露向董事會報告之頻率（至少一年一次）或當年度向董事會報告之日期。\n[備註]\n1、關於風險管理之政策與程序，可參考「上市上櫃公司風險管理實務守則」訂定相關規範。\n2、公司網站及公開資訊觀測站需分別揭露。（前開公開資訊觀測站之揭露係指揭露於公開資訊觀測站＞彙總報表＞公司治理＞公司組織/結構＞功能性委員會/組織成員）", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-19", "prevNo": "2.23", "indicator": "公司訂定之董事會績效評估辦法是否經董事會通過，明定至少每三年執行外部評估ㄧ次，並已於受評年度或過去兩年度執行評估，且揭露執行情形及評估結果？", "qtype": "AA", "criteria": "本指標以公司網站或年報，為評鑑資訊依據。", "guide": "需同時符合以下三項要件，始能於構面計分外，總分另加一分。\n[要件一]\n董事會績效評估辦法（含程序）經公司董事會通過，且明定至少每三年執行外部評估ㄧ次。\n[要件二]\n揭露最近三年內（113－115年）執行日期、執行評估之外部專業機構名稱或專家團隊成員（至少包括主持人）介紹，該外部機構、專家具備獨立性之理由、評估方式（如問卷或實地訪查）、標準（內容及項目），及評估結果提報董事會日期等內容。\n[要件三]\n摘要說明外部董事會績效評估結果，包括改善建議及未來改善計畫或行動。\n[備註]\n會計師事務所、律師事務所、承銷商等中介機構不適宜擔任外部績效評估單位。", "example": "有", "prevAns": "本公司業將114年度董事會外部績效評估執行情形，已揭露於公司網站 －公司治理專區/董事會/多元化政策，標題：董事會及功能性委員會績效評估執行結果（https://www.planet.com.tw/tw/ir/policy 網頁最下方)。\n本公司於114年7月25日委託「臺灣董事會績效協進會」執行董事會績效評估，該協進會以提升上市櫃公司董事會治理效能為宗旨，評估團隊委員包括召集人王泰昌教授(國立臺灣大學會計系特聘教授)、委員陳勝源教授(臺北商業大學財務金融學系特聘教授)、委員邱玟惠教授(東吳大學法學院專任教授)。委員均依職業道德規範執行職責，與本公司無財務、商業或親屬關係，具完全獨立性。\n本次績效評估方式包含問卷評估、書面審查及實地訪談，評估標準依據主管機關法令及相關研究文獻與法令指引，設計七大構面共五十項指標，涵蓋「董事會組成與結構」 、 「董事選任與持續進修」 、 「董事會對公司營運之參與程度」 、 「提升董事會決策品質」 、 「內部控制」 、 「永續發展」及「價值創造」 。\n本次外部董事會績效評估結果指出，委員高度肯定董事會在永續治理與策略指導所展現之卓越亮點與成就。同時，委員亦提出前瞻性的精進建議。\n一、卓越亮點與成就\n(一)董事會結構獨立多元：董事會由 7 席董事組成，4 席為獨立董事（佔比逾半），專長涵蓋財務、法律、人資、科技及永續領域，女性董事比例達 43%，展現多元與平衡。\n(二)董事積極履職盡責：近三年董事會、功能性委員會及股東會出席率均達100%，董事主動建言、審慎決策，充分發揮監督與策略職能。\n(三)公司治理持續精進：多次榮獲公司治理評鑑前 5%優良企業，並定期委託外部專業機構進行績效評估，展現持續自律與精進決心。\n(四)\t永續發展表現卓越：設立「永續發展委員會」推動 ESG，多次榮獲《天下永續公民獎》中堅企業組第一名，此外，公司在氣候策略上表現突出，TCFD 成熟度達 Level-5：Excellence。\n(五)品牌創新與創造價值：聚焦「淨零」與「數位」雙軸轉型，研發創新成果豐碩，財務穩健、ROE 與市價淨值比表現優異，持續提升品牌與股東價值。\n二、精進建議\n(一)董事接班規劃：及早啟動董事會成員接班規劃，以確保董事會持續運作與治理效能之穩定。\n(二)建立新任董事講習制度：制度化辦理「新任董事講習」，協助新任董事迅速熟悉業務。\n本公司已依外部董事會績效評估建議啟動董事接班規劃及建立新任董事講習制度，並於114年12月18日成立提名委員會，建構更系統化之董事遴選與接班制度，強化董事會之專業性、獨立性與多元化。\n董事會外部績效評估結果已於 114 年 12 月 18 日提報薪資報酬委員會及董事會。", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-20", "prevNo": "2.15", "indicator": "公司是否揭露獨立董事與內部稽核主管、會計師之單獨溝通情形（如就公司財務報告及財務業務狀況進行溝通之方式、事項及結果等）？", "qtype": "A", "criteria": "本指標以年報\\附表二之一「審計委員會運作情形資訊」，為評鑑資訊依據。", "guide": "需同時揭露以下兩項要件，始能於構面計分。\n[要件一]\n每年獨立董事與內部稽核主管及會計師透過會議（不包括董事會）或座談，且無一般董事及管理階層在場之情況下溝通之頻率，或定期分別與內部稽核主管及會計師溝通。\n[要件二]\n114年度各次會議日期、性質（如審計委員會或董事會會前會等）與溝通主題內容，如獨立董事提出建議，則需同時揭露公司處理執行結果；如無建議亦需註明本次會議無意見。\n[備註]\n可以視訊會議方式進行溝通。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-21", "prevNo": "2.17", "indicator": "公司董事會是否定期（至少一年一次）參考審計品質指標（AQIs）評估簽證會計師獨立性及適任性，並詳實揭露評估程序？", "qtype": "A", "criteria": "本指標以年報\\附表「公司治理運作情形及其與上市上櫃公司治理實務守則差異情形及原因」，為評鑑資訊依據。", "guide": "需同時揭露以下兩項要件，始能於構面計分。\n[要件一]\n董事會參考審計品質指標（AQIs）每年有定期評估或當年度有進行評估之事實。\n[要件二]\n董事會評估會計師獨立性及適任性之程序及具體評估會計師獨立性及適任性之標準（需列舉重要項目）。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-22", "prevNo": "2.25", "indicator": "公司之獨立董事是否均依「上市上櫃公司董事進修推行要點」規範之時數完成進修？\n【若全體董事均依規範完成進修，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以公開資訊觀測站 >單一公司＞公司治理＞董事/獨立董事/監察人＞出（列）席董事會及進修情形暨獨董現職經歷及兼任，為評鑑資訊依據。", "guide": "符合[要件一]，於構面計分；另符合[要件二]，則總分另加一分。\n[要件一]\n受評年度年底在任獨立董事皆符合規定之訓練時數。\n[要件二]\n受評年度年底在任董事皆符合規定之訓練時數。\n[備註]\n1、「上市上櫃公司董事進修推行要點」規範之時數，新任者至少12小時，續任者至少6小時。\n2、受評年度公司新聘之董事，若過去曾擔任其他上市櫃公司董事，屬於續任，受訓6小時即可。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1+1"}, {"dimension": "治理面（G）", "no": "G-23", "prevNo": "3.5", "indicator": "公司是否於股東常會開會18日前上傳以英文揭露之年度財務報告？\n【若於中文版期中財務報告申報期限後兩個月內以英文揭露期中財務報告者，則總分另加一分。】", "qtype": "A+", "criteria": "本指標以公開資訊觀測站＞單一公司＞電子文件下載＞財務報告書，為評鑑資訊依據。", "guide": "符合[要件一]，於構面計分；另符合[要件二]，則總分另加一分。\n[要件一]\n揭露114年度英文版之合併及個體財務報告；無子公司者，揭露114年度英文版之個別財務報告。前開英文版年度財務報告內容需與中文版一致，且上傳至公開資訊觀測站之隔天，至股東常會開會前1日，期間有18日（含）以上。\n[要件二]\n揭露115年第1~3季英文合併或個別財務報告。前開各季英文版財務報告內容需與中文版一致，且皆於中文版財務報告申報期限後兩個月內申報。\n[備註]\n1、英文版年度財務報告得為英文翻譯版本，建議加註「未經會計師核閱或查核簽證」之警語。\n2、要件一所列第18日如為假日，不予順延。要件二所列英文期中財務報告申報期限如為假日，不予順延。\n3、本指標以英文版財務報告電子書之申報日期為評分依據，並非英文版股東會年報申報日期。", "example": "有", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1+1"}, {"dimension": "治理面（G）", "no": "G-24", "prevNo": "3.9", "indicator": "公司是否於每月10日（含）前將內部人上月份持股變動之情形上傳至公開資訊觀測站？", "qtype": "A", "criteria": "本指標以證交所與櫃買中心之統計報表為評鑑資訊依據。", "guide": "[要件]\n115年每月10日（含）前將114年12月至115年11月之內部人持股變動之情形上傳至公開資訊觀測站。\n[備註]\n1、若資料申報後更正，則以最後申報日計算。\n2、每月10日如為假日，不予順延。\n3、遇有金融監督管理委員會為因應連續假期，公告將公開發行公司依據證券交易法第36條第1項第3款規定:「於每月10日以前，公告並申報上月份營運情形。」之期限延長時，本項評鑑指標之要件亦從寬認定予以同步延長，惟延長期限不得晚於次月14日。", "example": "無", "prevAns": "", "owner": "Leon", "ans115": "", "score": "1"}, {"dimension": "治理面（G）", "no": "G-25", "prevNo": "－", "indicator": "公司買回庫藏股且於受評年度期間屆滿或執行完畢者，是否有買回目的為轉讓予員工且平均執行率達90%以上，或於期間屆滿或執行完畢後揭露買回期間之每日實際執行情形？", "qtype": "B", "criteria": "本指標「買回目的為轉讓予員工且平均執行率達90%以上」，以公開資訊觀測站＞彙總報表＞股權變動/證券發行＞有價證券＞國內有價證券＞庫藏股統計彙總表，為評鑑資訊依據。\n本指標「於期間屆滿或執行完畢後揭露買回期間之每日實際執行情形」，以公開資訊觀測站＞單一公司＞股權變動/證券發行＞庫藏股＞期間屆滿/執行完畢公告，為評鑑資訊依據。", "guide": "符合下列其中一項要件，於構面計分，但有備註2之情形例外。\n[要件一]\n公司買回庫藏股且於受評年度期間屆滿或執行完畢者，有買回目的為轉讓予員工且平均執行率達90%以上之情事。\n[要件二]\n受評年度於公開資訊觀測站申報買回庫藏股之期間屆滿或執行完畢公告時（不論買回庫藏股之目的），每次均揭露每日買回庫藏股之實際買回股數、買回總金額及價格區間。\n[備註]\n1、公司受評年度未有買回庫藏股，或公司有買回庫藏股惟於受評年度期間未屆滿或未執行完畢者，本指標不適用。\n2、若受評年度有買回庫藏股之執行率低於50%之情事（不論買回庫藏股之目的），本指標不予給分。\n3、關於要件一，買回庫藏股之目的非屬轉讓予員工者，不計入平均執行率之計算。執行率係指該次已買回股數占預定買回股數之比例（計算至小數點後2位），若受評年度有多次買回庫藏股，則採各次執行率之簡單平均數計算（計算至小數點後2位）。", "example": "有", "prevAns": "無", "owner": "Leon", "ans115": "", "score": "NA"}, {"dimension": "治理面（G）", "no": "G-26", "prevNo": "3.13", "indicator": "公司年報是否自願揭露董事之個別酬金？", "qtype": "AA", "criteria": "本指標以年報\\附表「ㄧ般董事及獨立董事之酬金（個別揭露姓名及酬金方式）」，為評鑑資訊依據。", "guide": "符合下列其中一項要件，於構面計分外，總分另加一分。\n[要件一]\n自願揭露所有董事之個別酬金細目。\n[要件二]\n依法規需揭露部分董事之個別酬金細目，而公司自願揭露其餘所有董事之個別酬金細目。\n[備註]\n1、需完整揭露年報附表「一般董事及獨立董事之酬金（個別揭露姓名及酬金方式）」之各欄位資訊，始能得分。\n2、請確認所揭露內容係依最新法規，且酬金表格如有空白（如無金額請以「0」或「無」表示）、金額誤植或欄位缺漏，無法得分   /* ── CSV 解析（支援儲存格內換行、雙引號跳脫）── */
  function parseCSVRows(text) {
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i+1];
      if (ch === '"') { if (inQ && next === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur); cur = ''; }
      else if ((ch === '\n' || ch === '\r') && !inQ) {
        if (ch === '\r' && next === '\n') i++;
        row.push(cur);
        if (row.some(v => String(v).trim())) rows.push(row);
        row = []; cur = '';
      } else { cur += ch; }
    }
    row.push(cur);
    if (row.some(v => String(v).trim())) rows.push(row);
    return rows;
  }

  async function loadScoreData() {

      const rows = parseCSVRows(await res.text());
      /* 結構（依截圖）：
         row[5] = 得分題數行：B=環境得分, C=社會得分, D=治理得分
         row[7] = 分數試算行：B=得分, C=額外加分, D=預估總得分  */
      const g  = (r, ci) => r && r[ci] ? cleanCell(r[ci]) : '—';
      const r5 = rows[5];  // index 5 = 第6列（得分題數）
      const r7 = rows[7];  // index 7 = 第8列（分數試算）
      scoreData = {
        eScore : g(r5,1),   // B6
        sScore : g(r5,2),   // C6
        gScore : g(r5,3),   // D6
        bonus  : g(r7,2),   // C8 額外加分
        total  : g(r7,3),   // D8 預估總得分
      };
      console.log('[ESG] scoreData:', scoreData);

  async function saveAns() {
    const ta  = $el('ans-input');
    const btn = $el('save-btn');
    const hint= $el('save-hint');
    if (!ta || !editRow) return;
    const text = ta.value.trim();
    if (!text) {
      hint.style.display='block';
      hint.style.background='#FFF8E1';
      hint.style.border='1px solid rgba(251,192,45,.5)';
      hint.style.color='#F57F17';
      hint.textContent='⚠️ 請先輸入115年填答內容。';
      ta.focus(); return;
    }
    // 送出前 UI
    btn.disabled=true;
    btn.textContent='⏳ 儲存中…';
    hint.style.display='none';
    try {
      const res = await fetch(GAS_URL, {
        method : 'POST',
        mode   : 'no-cors',   // GAS 需要 no-cors
        headers: { 'Content-Type': 'text/plain' },
        body   : JSON.stringify({ no: editRow.no, ans115: text }),
      });
      // no-cors 無法讀取 response，只要沒拋錯就視為成功
      hint.style.display='block';
      hint.style.background='#ECFDF5';
      hint.style.border='1px solid rgba(22,163,74,.3)';
      hint.style.color='#15803D';
      hint.textContent='✅ 已儲存至 Google 試算表！（' + editRow.no + ' 的 115年填答欄）';
      // 更新本地資料
      editRow.ans115 = text;
      const found = allData.find(r => r.no === editRow.no);
      if (found) found.ans115 = text;
      btn.textContent='✅ 已儲存';
      setTimeout(() => {
        btn.disabled=false;
        btn.textContent='💾 儲存至試算表';
      }, 3000);
    } catch(err) {
      hint.style.display='block';
      hint.style.background='#FEE2E2';
      hint.style.border='1px solid rgba(220,38,38,.3)';
      hint.style.color='#991B1B';

      btn.disabled=false;
      btn.textContent='💾 儲存至試算表';
    }

          <td style="padding-top:10px;text-align:center">${fillCell}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;

    window.fillRows = rows;
  }

  /* ── 得分評估 ── */
  let evF='all', evOwF='all';

  function classifyScore(s) {
    if (!s || s.trim()==='') return 'empty';
    const v = s.trim().toUpperCase();
    if (v==='NA' || v==='N/A' || v==='不適用') return 'na';
    const n = parseFloat(s.replace(/[^0-9.\-]/g,''));
    if (isNaN(n)) return 'empty';
    return n > 0 ? 'has' : 'zero';
  }

  function geval() {
    const q=($el('siev')?.value||'').toLowerCase();
    let r=[...allData];
    if (evOwF!=='all') r=r.filter(x=>x.owner===evOwF);
    if (evF!=='all')   r=r.filter(x=>classifyScore(x.estScore)===evF);
    if (q) r=r.filter(x=>x.indicator.toLowerCase().includes(q)||x.owner.toLowerCase().includes(q)||x.no.toLowerCase().includes(q));
    return r;
  }
  function sev(v) {
    evF=v;
    ['all','has','zero','na'].forEach(k=>$el('ev-'+k)?.classList.toggle('active',k===v));
    renderEvalTable();
  }
  function sevow(btn,v) {
    evOwF=v;
    document.querySelectorAll('.fb[data-ev-ow]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderEvalTable();
  }

  function renderEvalTable() {
    const rows=geval(), el=$el('eval-table');
    if (!el) return;
    if (!rows.length) { el.innerHTML='<div class="tmsg">此篩選條件下沒有資料</div>'; return; }

    el.innerHTML=`<table class="dt" style="table-layout:fixed">
      <colgroup>
        <col style="width:48px"><col style="width:60px">
        <col style="width:26%"><col style="width:64px">
        <col style="width:28%"><col style="width:110px">
      </colgroup>
      <thead><tr>
        <th style="text-align:center">面向</th>
        <th>編號</th>
        <th>評鑑指標</th>
        <th>負責人</th>
        <th>115年填答</th>
        <th style="text-align:center">可得分數</th>
      </tr></thead>
      <tbody>${rows.map(r=>{
        const cls=classifyScore(r.estScore);
        const scoreDisplay = cls==='has'
          ? `<span style="font-size:15px;font-weight:600;color:#16A34A">${r.estScore}</span><br><span style="font-size:10px;color:#16A34A">✅ 可得分</span>`
          : cls==='zero'
          ? `<span style="font-size:13px;font-weight:500;color:#DC2626">0</span><br><span style="font-size:10px;color:#DC2626">❌ 未得分</span>`
          : cls==='na'
          ? `<span style="font-size:13px;color:#94A3B8">N/A</span><br><span style="font-size:10px;color:#94A3B8">➖ 不適用</span>`
          : `<span style="font-size:12px;color:#CBD5E1">—</span>`;
        const ans=r.ans115.trim();
        const esgTag=esgOf(r.dimension);
        return `<tr style="vertical-align:top">
          <td style="text-align:center;padding-top:12px"><span class="etag ${esgTag}">${esgTag}</span></td>
          <td style="padding-top:12px;font-size:11.5px;font-weight:600;color:var(--text2)">${r.no}</td>
          <td style="font-size:12.5px;line-height:1.75;padding-top:10px">${r.indicator.replace(/\n/g,'<br>')}</td>
          <td style="padding-top:11px">${r.owner?`<span class="pb2">${r.owner}</span>`:'—'}</td>
          <td style="font-size:12px;line-height:1.7;padding-top:10px;color:var(--text2)">${ans||'<span style="color:#CBD5E1">尚未填答</span>'}</td>
          <td style="text-align:center;padding-top:10px">${scoreDisplay}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  /* ── SVG 折線圖 ── */
  function renderScorePage() {
    const est115 = scoreData ? parseFloat(scoreData.total) : null;

    const PTS = [
      {y:'103', s:90.27},  {y:'104', s:87.14},  {y:'105', s:77.60},
      {y:'106', s:87.05},  {y:'107', s:83.40},  {y:'108', s:83.43},
      {y:'109', s:90.87},  {y:'110', s:93.45},  {y:'111', s:100.56},
      {y:'112', s:101.25}, {y:'113', s:104.08}, {y:'114', s:104.87},
      {y:'115', s:est115},
    ];

    function getInfo(yr) {
      return (window._histRows||[]).find(h=>h.y===yr) || {result:'',note:''};
    }
    function isTop5(yr)  { return /前5%/.test(getInfo(yr).result||''); }
    function is6to20(yr) { return /6%~20%/.test(getInfo(yr).result||''); }

    const W=900, H=360, PL=52, PR=20, PT=52, PB=52;
    const CW=W-PL-PR, CH=H-PT-PB;
    const minV=70, maxV=120;
    function px(i)   { return PL + i*(CW/(PTS.length-1)); }
    function py(val) { return PT + CH - (val-minV)/(maxV-minV)*CH; }

    // Y 軸格線
    let gridLines='', yLabels='';
    [80,90,100,110,120].forEach(v => {
      const y=py(v);
      gridLines += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#E5E7EB" stroke-width="1"/>`;
      yLabels   += `<text x="${PL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="#9CA3AF">${v}</text>`;
    });

    // 折線（深藍色）
    const validPts = PTS.filter(d=>d.s!=null);
    const polyPts  = validPts.map(d=>`${px(PTS.indexOf(d)).toFixed(1)},${py(d.s).toFixed(1)}`).join(' ');

    // 圓點 + 標籤
    let dots='', scoreLabels='', rankLabels='';
    PTS.forEach((d,i)=>{
      if(d.s==null) return;
      const cx=px(i), cy=py(d.s);
      const is115 = d.y==='115';
      const top5  = isTop5(d.y);
      const r6    = is6to20(d.y);

      // 圓點顏色
      let fill, stroke;
      if (is115)      { fill='#F59E0B'; stroke='#fff'; }  // 黃色
      else if (top5)  { fill='#C0392B'; stroke='#fff'; }  // 紅色
      else            { fill='#6B7280'; stroke='#fff'; }  // 灰色

      dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="7" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;

      // 分數標籤（上方）
      const labelColor = is115 ? '#B45309' : top5 ? '#C0392B' : '#6B7280';
      if (!is115) scoreLabels += `<text x="${cx.toFixed(1)}" y="${(cy-12).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="bold" fill="${labelColor}">${d.s.toFixed(2)}</text>`;

      // 排名標籤（分數上方再一行）
      let rankText = '';
      if (is115)     rankText = ''; // 115年不顯示預估文字
      else if (top5) rankText = '前5%';
      else if (r6)   rankText = '6~20%';
      if (rankText) {
        const rankColor = is115 ? '#B45309' : top5 ? '#991B1B' : '#374151';
        rankLabels += `<text x="${cx.toFixed(1)}" y="${(cy-24).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="${rankColor}">${rankText}</text>`;
      }
    });

    // X 軸年度
    let xLabels='';
    PTS.forEach((d,i)=>{
      xLabels += `<text x="${px(i).toFixed(1)}" y="${(H-PB+18).toFixed(1)}" text-anchor="middle" font-size="11" fill="#9CA3AF">${d.y}年</text>`;
    });

    // Y 軸標題
    const midY=(PT+CH/2).toFixed(0);
    const yTitle=`<text x="14" y="${midY}" text-anchor="middle" font-size="12" fill="#9CA3AF" transform="rotate(-90,14,${midY})">成績</text>`;

    // 圖例
    const legend=`
      <circle cx="70" cy="16" r="6" fill="#C0392B" stroke="#fff" stroke-width="1.5"/>
      <text x="82" y="20" font-size="11" fill="#6B7280">排名前5%</text>
      <circle cx="148" cy="16" r="6" fill="#6B7280" stroke="#fff" stroke-width="1.5"/>
      <text x="160" y="20" font-size="11" fill="#6B7280">排名6~20%</text>
      <circle cx="230" cy="16" r="6" fill="#F59E0B" stroke="#fff" stroke-width="1.5"/>
      <text x="242" y="20" font-size="11" fill="#6B7280">115年預估</text>`;

    const svgHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      ${legend}
      <g transform="translate(0,24)">
        ${gridLines}
        <polyline points="${polyPts}" fill="none" stroke="#1D4ED8" stroke-width="2.5" stroke-linejoin="round"/>
        ${rankLabels}
        ${scoreLabels}
        ${dots}
        ${xLabels}
        ${yLabels}
        ${yTitle}
      </g>
    </svg>`;

    const wrap=document.getElementById('score-chart-svg');
    if(wrap) wrap.innerHTML=svgHTML;

    // 表格
    const tbody=document.getElementById('score-tbody');
    if(tbody){
      tbody.innerHTML=[...PTS].reverse().map(d=>{
        const isEsg=d.y==='115';
        const v=d.s;
        const vs=v!=null?v.toFixed(2):'—';
        const vc=isEsg?'#DC2626':'#1D4ED8';
        const tag=isEsg
          ?'<span class="score-badge esg">ESG評鑑</span>'
          :'<span class="score-badge cg">公司治理評鑑</span>';
        const info=getInfo(d.y);
        return `<tr style="border-bottom:1px solid rgba(59,130,246,.07)">
          <td style="padding:9px 16px;font-weight:500">${d.y}年</td>
          <td style="padding:9px 16px">${tag}</td>
          <td style="padding:9px 16px;text-align:right;font-size:15px;color:${vc};font-weight:600">${vs}${isEsg&&v?' <span style="font-size:10px">(預估)</span>':''}</td>
          <td style="padding:9px 16px;color:var(--text3);font-size:12px">${info.result||''}</td>
          <td style="padding:9px 16px;color:var(--text3);font-size:12px">${info.note||''}</td>
        </tr>`;
      }).join('');
    }
  }

  async function loadData() {
    if (isLoading) return;
    isLoading=true;
    $el('rb').classList.add('sp'); hideErr(); setSS('同步中…');
    try {
      let parsed=[]; let lastErr=null;
      for (const url of CSV_URLS) {
        try {
          const sep=url.includes('?')?'&':'?';
          const res=await fetch(url+sep+'t='+Date.now(),{cache:'no-store'});
          if (!res.ok) throw new Error('HTTP '+res.status);
          parsed=parseCSV(await res.text());
          if (parsed.length) break;
          throw new Error('empty');
        } catch(e) { lastErr=e; }
      }
      if (!parsed.length) throw lastErr||new Error('empty');
      allData=parsed; hideErr(); setSS(nowStr());
      console.log('[ESG] 同步成功，共', parsed.length, '筆。E-1 prevAns:', parsed.find(r=>r.no==='E-1')?.prevAns?.slice(0,30));
    } catch(e) {
      console.warn('Sheets 同步失敗：',e);
      showErr();
      if (!allData.length) allData=FALLBACK;
      setSS('同步失敗，顯示備用資料');
    }
    $el('rb').classList.remove('sp'); isLoading=false;
    await Promise.all([loadScoreData(), loadHistData()]);
    renderHSC(allData);
    renderGuide(gf());
    // 若已切到歷年得分頁，同步更新圖表
    if (document.getElementById('tabx-score-panel')?.style.display !== 'none') {
      renderScorePage();
    }
  }
  function refresh() { loadData(); }

  loadData();
  setInterval(loadData, 5*60*1000);
</script>

</body>
</html>
